# tasks/pipelines.yml — Graylog pipeline management (Firewall + DNS + Web + Proxy + WAF)
# Deploys pipeline rules that extract fields required by the dashboards.
# Requires: GeoIP lookup tables already created (from graylog server role)
---
# ── Fetch current state ───────────────────────────────────────
- name: Get existing pipelines
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/pipeline"
    method: GET
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
    return_content: true
  register: _pipelines
  tags: [config]

- name: Get existing rules
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/rule"
    method: GET
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
    return_content: true
  register: _existing_rules
  tags: [config]

# ── Firewall Pipeline ─────────────────────────────────────────
- name: Create Firewall pipeline
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/pipeline"
    method: POST
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
      Content-Type: application/json
    body_format: json
    body:
      title: "Firewall Log Processing"
      description: "VyOS FW field extraction + GeoIP via lookup tables"
      source: "{{ graylog_pipeline_source }}"
    status_code: [200, 201]
    return_content: true
  register: _fw_pipeline_created
  when: _pipelines.json | selectattr('title', 'equalto', 'Firewall Log Processing') | list | length == 0
  tags: [config]

- name: Update Firewall pipeline source
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/pipeline/{{ (_pipelines.json | selectattr('title', 'equalto', 'Firewall Log Processing') | map(attribute='id') | first) }}"
    method: PUT
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
      Content-Type: application/json
    body_format: json
    body:
      id: "{{ _pipelines.json | selectattr('title', 'equalto', 'Firewall Log Processing') | map(attribute='id') | first }}"
      title: "Firewall Log Processing"
      description: "VyOS FW field extraction + GeoIP via lookup tables"
      source: "{{ graylog_pipeline_source }}"
    status_code: [200, 201]
  when: _pipelines.json | selectattr('title', 'equalto', 'Firewall Log Processing') | list | length > 0
  tags: [config]

- name: Create Firewall rule
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/rule"
    method: POST
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
      Content-Type: application/json
    body_format: json
    body:
      title: "Extract Firewall Fields"
      description: "Parse iptables fields + ports + GeoIP enrichment via lookup tables"
      source: "{{ graylog_pipeline_rule_source }}"
    status_code: [200, 201]
  when: _existing_rules.json | selectattr('title', 'equalto', 'Extract Firewall Fields') | list | length == 0
  tags: [config]

- name: Update Firewall rule source
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/rule/{{ (_existing_rules.json | selectattr('title', 'equalto', 'Extract Firewall Fields') | map(attribute='id') | first) }}"
    method: PUT
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
      Content-Type: application/json
    body_format: json
    body:
      id: "{{ _existing_rules.json | selectattr('title', 'equalto', 'Extract Firewall Fields') | map(attribute='id') | first }}"
      title: "Extract Firewall Fields"
      description: "Parse iptables fields + ports + GeoIP enrichment via lookup tables"
      source: "{{ graylog_pipeline_rule_source }}"
    status_code: [200, 201]
  when: _existing_rules.json | selectattr('title', 'equalto', 'Extract Firewall Fields') | list | length > 0
  tags: [config]

