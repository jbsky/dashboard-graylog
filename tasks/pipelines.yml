# ── Connect all pipelines to Default Stream ───────────────────
- name: Refresh pipeline list
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/pipeline"
    method: GET
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
    return_content: true
  register: _pipelines_final
  tags: [config]

- name: Collect all pipeline IDs
  ansible.builtin.set_fact:
    _all_pipeline_ids: >-
      {{ _pipelines_final.json
         | selectattr('title', 'in', graylog_pipeline_titles)
         | map(attribute='id') | list }}
  tags: [config]

- name: Get stream connections
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/connections"
    method: GET
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
    return_content: true
  register: _connections
  tags: [config]

- name: Connect pipelines to Default Stream
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/pipelines/connections/to_stream"
    method: POST
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
      Content-Type: application/json
    body_format: json
    body:
      stream_id: "000000000000000000000001"
      pipeline_ids: "{{ _all_pipeline_ids }}"
    status_code: [200, 201]
  when: >-
    (_connections.json
     | selectattr('stream_id', 'defined')
     | selectattr('stream_id', 'equalto', '000000000000000000000001')
     | map(attribute='pipeline_ids') | first | default([])
     | sort) != (_all_pipeline_ids | sort)
  tags: [config]

# ── Message processor order ───────────────────────────────────
- name: Configure message processor order (Pipeline before Stream Rules)
  ansible.builtin.uri:
    url: "{{ graylog_api_url }}/api/system/messageprocessors/config"
    method: PUT
    user: "{{ graylog_root_username }}"
    password: "{{ vault_graylog_root_password }}"
    force_basic_auth: true
    headers:
      X-Requested-By: ansible
      Content-Type: application/json
    body_format: json
    body:
      disabled_processors:
        - "org.graylog.plugins.map.geoip.processor.GeoIpProcessor"
      processor_order:
        - class_name: "org.graylog2.messageprocessors.MessageFilterChainProcessor"
          name: "Message Filter Chain"
        - class_name: "org.graylog.plugins.pipelineprocessor.processors.PipelineInterpreter"
          name: "Pipeline Processor"
        - class_name: "org.graylog2.messageprocessors.StreamMatcherFilterProcessor"
          name: "Stream Rule Processor"
    status_code: [200]
  tags: [config]
